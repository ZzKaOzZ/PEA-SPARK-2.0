<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEA SPARK Login</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    color:#e6edf3;
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:360px;
    background:#161b22;
    border:1px solid #30363d;
    border-radius:12px;
    padding:32px;
    box-shadow:0 10px 30px rgba(0,0,0,.45);
}

.logo{
    text-align:center;
    font-size:42px;
    margin-bottom:10px;
}

.title{
    text-align:center;
    font-size:24px;
    font-weight:700;
    margin-bottom:6px;
}

.subtitle{
    text-align:center;
    color:#768390;
    font-size:13px;
    margin-bottom:28px;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:12px;
    color:#9da7b3;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:18px;
    border-radius:8px;
    border:1px solid #30363d;
    background:#0d1117;
    color:#fff;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#00e5ff;
    box-shadow:0 0 0 3px rgba(0,229,255,.15);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00bcd4;
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#00acc1;
}

.error{
    background:rgba(248,81,73,.12);
    border:1px solid rgba(248,81,73,.4);
    color:#f85149;
    padding:10px;
    border-radius:8px;
    margin-bottom:16px;
    text-align:center;
    font-size:13px;
}

.footer{
    margin-top:18px;
    text-align:center;
    font-size:11px;
    color:#768390;
}
</style>
</head>
<body>

<div class="login-box">
    <div class="logo"><img src="{{ url_for('static', filename='logo.png') }}" alt="PEA Logo" style="width:200px;height:200px;object-fit:contain;"></div>
    <div class="subtitle">Provincial Electricity Authority</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">LOGIN</button>
    </form>

    <div class="footer">
        PEA SPARK GIS SYSTEM
    </div>
</div>

</body>
</html>
